# Build and publish the headless hub image to GitHub Container Registry.
#
# Versioning: the image is tagged with the workspace version read from
# Cargo.toml, so it tracks the upstream release version automatically — when
# you `git pull upstream` and the version bumps (e.g. 0.4.6 -> 0.4.7), the
# next push to main publishes :0.4.7 with no manual tagging.
#
# Tags published:
#   - push to main          -> :<cargo-version>, :<cargo-version>-<sha>, :latest
#   - push of a git tag v*  -> :<semver>, :<major>.<minor>  (explicit releases)
#   - manual run            -> :<cargo-version>, :<cargo-version>-<sha>
#
# :<cargo-version>      moves to the newest build of that version.
# :<cargo-version>-<sha> is immutable — pin this on the server for repeatable deploys.
#
# On the server:  docker compose pull && docker compose up -d
name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read workspace version
        id: vars
        run: |
          version="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version }}
            type=raw,value=${{ steps.vars.outputs.version }}-${{ steps.vars.outputs.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
