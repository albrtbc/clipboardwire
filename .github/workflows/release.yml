name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux artifacts (.deb, .rpm, raw binary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux tray build deps
        run: sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Install cargo-deb and cargo-generate-rpm
        run: cargo install --locked cargo-deb cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release -p clipboardwire

      - name: Strip binary
        run: strip target/release/clipboardwire

      - name: Build .deb
        run: cargo deb -p clipboardwire --no-build

      - name: Build .rpm
        # cargo-generate-rpm's -p flag is a path, not a package name (unlike
        # cargo proper). Point it at the binary crate's manifest.
        run: cargo generate-rpm -p cli

      - name: Rename raw binary for the release asset
        run: |
          mkdir -p dist
          cp target/release/clipboardwire dist/clipboardwire-linux-x86_64
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true

  macos:
    name: macOS artifacts (universal binary)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # macos-latest is currently Apple Silicon; we cross-build to
          # x86_64 too and lipo them into a universal binary so a single
          # download works on both Intel + ARM Macs.
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build aarch64 binary
        run: cargo build --release --target aarch64-apple-darwin -p clipboardwire

      - name: Build x86_64 binary
        run: cargo build --release --target x86_64-apple-darwin -p clipboardwire

      - name: Lipo into a universal binary + strip
        run: |
          mkdir -p dist
          lipo -create -output dist/clipboardwire-macos-universal \
            target/aarch64-apple-darwin/release/clipboardwire \
            target/x86_64-apple-darwin/release/clipboardwire
          strip dist/clipboardwire-macos-universal
          # Also ship the per-arch binaries for users who prefer them.
          cp target/aarch64-apple-darwin/release/clipboardwire dist/clipboardwire-macos-aarch64
          cp target/x86_64-apple-darwin/release/clipboardwire dist/clipboardwire-macos-x86_64

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true

  windows:
    name: Windows artifacts (.exe and .msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-wix
        run: cargo install --locked cargo-wix

      - name: Build release binary
        run: cargo build --release -p clipboardwire

      - name: Build MSI
        # `--no-build` reuses the binary we built in the previous step.
        run: cargo wix -p clipboardwire --no-build --nocapture

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\clipboardwire.exe dist\clipboardwire-windows-x86_64.exe
          Copy-Item target\wix\*.msi dist\

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
